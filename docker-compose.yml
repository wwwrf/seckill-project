name: seckill

services:
  mysql:
    image: mysql:8.0
    container_name: seckill-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: ecommerce_db
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    container_name: seckill-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 20

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.2
    container_name: seckill-rmq-namesrv
    user: "0:0"
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - mkdir -p /home/rocketmq/logs/rocketmqlogs && cd /home/rocketmq/rocketmq-5.3.2/bin && sh mqnamesrv
    ports:
      - "9877:9876"
    volumes:
      - namesrv-logs:/home/rocketmq/logs
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[N]amesrvStartup'"]
      interval: 10s
      timeout: 5s
      retries: 20

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    container_name: seckill-rmq-broker
    user: "0:0"
    restart: unless-stopped
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - mkdir -p /home/rocketmq/logs/rocketmqlogs /home/rocketmq/store && cd /home/rocketmq/rocketmq-5.3.2/bin && sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/rocketmq-broker.conf
    ports:
      - "10911:10911"
      - "10909:10909"
      - "10912:10912"
    volumes:
      - ./deploy/rocketmq/broker.conf:/home/rocketmq/rocketmq-broker.conf:ro
      - broker-store:/home/rocketmq/store
      - broker-logs:/home/rocketmq/logs
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -q '[B]rokerStartup'"]
      interval: 10s
      timeout: 5s
      retries: 20

  rmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: seckill-rmq-dashboard
    restart: unless-stopped
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    ports:
      - "8081:8080"

  # ==================== 多实例 API + Nginx 负载均衡 ====================
  #
  # 三个 API 实例通过 Nginx 做 least_conn 负载均衡，统一从 :8080 对外暴露。
  # 每个实例注入不同的 SNOWFLAKE_NODE，避免分布式场景下订单号冲突。
  # 单实例调试时可直接 docker compose up app1 跳过 nginx。

  nginx:
    image: nginx:1.25-alpine
    container_name: seckill-nginx
    restart: unless-stopped
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
      app3:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-api-1
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy
    working_dir: /app
    command: ["/app/api"]
    environment:
      APP_CONFIG: docker
      SNOWFLAKE_NODE: "1"
      TZ: Asia/Shanghai
    volumes:
      - ./logs/app1:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-api-2
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy
    working_dir: /app
    command: ["/app/api"]
    environment:
      APP_CONFIG: docker
      SNOWFLAKE_NODE: "2"
      TZ: Asia/Shanghai
    volumes:
      - ./logs/app2:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  app3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seckill-api-3
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy
    working_dir: /app
    command: ["/app/api"]
    environment:
      APP_CONFIG: docker
      SNOWFLAKE_NODE: "3"
      TZ: Asia/Shanghai
    volumes:
      - ./logs/app3:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

volumes:
  mysql-data:
  redis-data:
  namesrv-logs:
  broker-store:
  broker-logs:
