worker_processes auto;

events {
    worker_connections 10240;
    use epoll;
}

http {
    # 基础配置
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 1m;

    # 日志格式（含上游响应时间，便于压测分析延迟分布）
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    'rt=$request_time ut=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Docker 内置 DNS，配合 depends_on healthcheck 兜底容器重启后的 IP 变化
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 上游 API 实例池（least_conn 根据当前活跃连接数分配，比 round_robin 更适合延迟不均的场景）
    upstream seckill_api {
        least_conn;
        server app1:8080;
        server app2:8080;
        server app3:8080;
        keepalive 128;  # 复用长连接，减少 TCP 握手开销
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass         http://seckill_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";          # 启用 upstream keepalive
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            proxy_connect_timeout 3s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;
        }

        # pprof 仅允许本地访问（生产环境安全加固）
        location /debug/pprof/ {
            allow 127.0.0.1;
            deny  all;
            proxy_pass http://seckill_api;
        }
    }
}
