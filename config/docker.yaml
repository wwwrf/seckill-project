server:
  port: 8080
  mode: debug
  # 多实例部署时通过环境变量 SNOWFLAKE_NODE 注入不同节点 ID（1-1023）
  # 单实例时默认使用此值
  snowflakeNode: 1

jwt:
  secret: "seckill-system-jwt-secret-key-2026-change-in-production"
  expiryHours: 24

admin:
  token: "change-this-admin-token-in-production"

mysql:
  host: mysql
  port: 3306
  username: root
  password: "root123456"
  database: ecommerce_db
  charset: utf8mb4
  parseTime: true
  loc: Local
  maxIdleConns: 60
  maxOpenConns: 120
  connMaxLifetime: 3600

redis:
  host: redis
  port: 6379
  password: ""
  db: 0
  poolSize: 1200
  minIdleConns: 300
  pendingExpireSeconds: 300

rocketmq:
  nameServer: rocketmq-namesrv:9876
  groupName: seckill_group
  retryTimes: 2
  timeout: 3

ratelimit:
  ip:
    enabled: false
    rps: 2000
    burst: 4000
  user:
    enabled: true
    rps: 12
    burst: 24

agent:
  intent:
    llm_enabled: false
    openai:
      api_key: ""
      model: "gpt-4o-mini"
      base_url: ""

log:
  level: info
  filename: logs/app.log
  maxSize: 100
  maxBackups: 10
  maxAge: 30
  compress: true
